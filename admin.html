<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VDS PHOTOGRAPHYa Control Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style> body { font-family: 'Poppins', sans-serif; background-color: #0F172A; color: white; } </style>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div id="login-screen" class="bg-white/10 p-8 rounded-lg border border-white/20 shadow-2xl w-full max-w-md backdrop-blur-md">
        <h2 class="text-3xl font-bold mb-2 text-center tracking-widest uppercase">VDS PHOTOGRAPHYa Admin</h2>
        <p class="text-gray-400 text-sm mb-6 text-center">Sign in to manage portfolio.</p>
        
        <input type="email" id="email" placeholder="Email" class="w-full bg-transparent border-b border-gray-500 focus:border-[#D4AF37] py-3 outline-none mb-4 transition-colors">
        <input type="password" id="password" placeholder="Password" class="w-full bg-transparent border-b border-gray-500 focus:border-[#D4AF37] py-3 outline-none mb-6 transition-colors">
        
        <button id="login-btn" class="w-full py-3 bg-[#D4AF37] text-[#0F172A] font-bold uppercase tracking-widest hover:bg-white transition-colors">Login</button>
        <p id="login-error" class="text-red-400 text-sm mt-4 text-center hidden"></p>
    </div>

    <div id="upload-screen" class="hidden bg-white/10 p-8 rounded-lg border border-white/20 shadow-2xl w-full max-w-lg backdrop-blur-md">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold tracking-widest uppercase">Upload Photo</h2>
            <button id="logout-btn" class="text-sm text-gray-400 hover:text-white underline">Logout</button>
        </div>

        <label class="block text-sm font-medium mb-2 text-gray-300">1. Select Category</label>
        <select id="category" class="w-full bg-[#0F172A] border border-gray-500 text-white p-3 rounded mb-8 outline-none focus:border-[#D4AF37]">
            <option value="wedding">Wedding</option>
            <option value="portrait">Portrait</option>
            <option value="editorial">Editorial</option>
        </select>

        <label class="block text-sm font-medium mb-2 text-gray-300">2. Upload Image</label>
        <button id="upload_widget" class="w-full py-4 border-2 border-dashed border-gray-500 text-gray-300 hover:border-[#D4AF37] hover:text-[#D4AF37] transition-colors rounded mb-4">
            Click to Open Cloudinary Uploader
        </button>
        
        <p id="upload-status" class="text-center text-sm mt-4 font-bold text-[#D4AF37]"></p>
    </div>

    <script src="admin.js"></script>
</body>
</html>
