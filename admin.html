<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VDS Photography | Control Panel</title>
    <link rel="icon" type="image/png" href="logo.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style> body { font-family: 'Poppins', sans-serif; background-color: #0F172A; color: white; } </style>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
</head>
<body class="flex justify-center min-h-screen py-12 px-4">

    <div id="login-screen" class="bg-white/10 p-8 rounded-lg border border-white/20 shadow-2xl w-full max-w-md backdrop-blur-md h-fit">
        <h2 class="text-3xl font-bold mb-2 text-center tracking-widest uppercase">VDS Admin</h2>
        <p class="text-gray-400 text-sm mb-6 text-center">Sign in to manage studio content.</p>
        
        <input type="email" id="email" placeholder="Email" class="w-full bg-transparent border-b border-gray-500 focus:border-[#D4AF37] py-3 outline-none mb-4 transition-colors">
        <input type="password" id="password" placeholder="Password" class="w-full bg-transparent border-b border-gray-500 focus:border-[#D4AF37] py-3 outline-none mb-6 transition-colors">
        
        <button id="login-btn" class="w-full py-3 bg-[#D4AF37] text-[#0F172A] font-bold uppercase tracking-widest hover:bg-white transition-colors">Login</button>
        <p id="login-error" class="text-red-400 text-sm mt-4 text-center hidden"></p>
    </div>

    <div id="upload-screen" class="hidden bg-white/10 p-8 rounded-lg border border-white/20 shadow-2xl w-full max-w-5xl backdrop-blur-md h-fit">
        
        <div class="flex justify-between items-center mb-8 border-b border-white/10 pb-4">
            <h2 class="text-2xl font-bold tracking-widest uppercase text-[#D4AF37]">Studio Dashboard</h2>
            <button id="logout-btn" class="text-sm text-gray-400 hover:text-white underline tracking-widest uppercase">Logout</button>
        </div>

        <div class="bg-black/30 p-6 rounded-lg border border-white/5 mb-10">
            <h3 class="text-lg font-bold tracking-widest uppercase mb-4 text-white">Upload New Content</h3>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="block text-sm font-medium mb-2 text-gray-300">1. Destination</label>
                    <select id="destination" class="w-full bg-[#0F172A] border border-gray-500 text-white p-3 rounded outline-none focus:border-[#D4AF37]">
                        <option value="portfolio">Portfolio (Photos)</option>
                        <option value="films">Films (Videos)</option>
                    </select>
                </div>

                <div id="photo-options">
                    <label class="block text-sm font-medium mb-2 text-gray-300">2. Photo Category</label>
                    <select id="category" class="w-full bg-[#0F172A] border border-gray-500 text-white p-3 rounded outline-none focus:border-[#D4AF37]">
                        <option value="wedding">Wedding</option>
                        <option value="portrait">Portrait</option>
                        <option value="editorial">Editorial</option>
                    </select>
                </div>

                <div id="video-options" class="hidden">
                    <label class="block text-sm font-medium mb-2 text-gray-300">2. Video Title</label>
                    <input type="text" id="video-title" placeholder="e.g. Aria & James Wedding" class="w-full bg-[#0F172A] border border-gray-500 text-white p-3 rounded outline-none focus:border-[#D4AF37]">
                </div>
            </div>

            <label class="block text-sm font-medium mb-2 text-gray-300">3. Upload File</label>
            <button id="upload_widget" class="w-full py-4 border-2 border-dashed border-gray-500 text-gray-300 hover:border-[#D4AF37] hover:text-[#D4AF37] transition-colors rounded mb-2 font-medium tracking-wide">
                + Click to Open Cloudinary Uploader (Accepts Image & MP4)
            </button>
            <p id="upload-status" class="text-center text-sm font-bold h-6 mt-2"></p>
        </div>

        <div>
            <h3 class="text-lg font-bold tracking-widest uppercase mb-4 text-white">Manage Live Content</h3>
            <div id="admin-gallery" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                </div>
        </div>
        
    </div>

    <script src="admin.js"></script>
</body>
</html>
